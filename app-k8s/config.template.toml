# Prompt strategy for the agent. This argument is here for backwards compatibility.
# Options: "zeroshot_base", "zeroshot_cot", "fewshot_base", "fewshot_cot"
prompt_type = "zeroshot_base"

# Number of queries to generate for each error type (15 error types total)
num_queries = 1

# Path for benchmark config file (absolute path).
benchmark_path = "error_config.json"

# Generate new benchmark config always (true) or use existing one if possible (false)
regenerate_config = true

# Root directory for all output files (logs, results, figures)
# Use relative path for Docker compatibility
output_dir = "output"

# Path to the Google microservices-demo directory
# In Docker with volume mount: /microservices-demo (clone manually)
# Local: /path/to/your/microservices-demo
microservice_dir = "/microservices-demo"

# Maximum iterations per query.
max_iterations = 10

# Agent client configurations. Each entry defines how to connect to each LLM service we wish to evaluate
# as well as the prompt strategy to use for that service. All agents must have a unique name.
# Currently, K8s deployment only supports one agent client config, but this may be expanded in the future.
[[agent_client_configs]]
name = "azure-gpt"
base_url = "http://127.0.0.1:8000"
prompt_type = "zeroshot_cot"