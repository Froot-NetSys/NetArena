# Prompt strategy for the agent. This argument is here for backwards compatibility.
# Options: "zeroshot_base", "zeroshot_cot", "fewshot_base", "fewshot_cot"
prompt_type = "zeroshot_base"

# Number of queries to generate for each error type (15 error types total)
num_queries = 1

# Path for benchmark config file (relative to output_dir)
benchmark_path = "test_data.json"

# Generate new benchmark config (true) or use existing (false)
# Set to true for first run, then false to reuse the same benchmark
regenerate_benchmark = false

# Root directory for all output files (logs, results, figures)
# Use relative path for Docker compatibility
output_dir = "output"

# Maximum iterations per query.
max_iterations = 10

# Network topology configuration
num_switches = 2
num_hosts_per_subnet = 1

# Agent client configurations.
[[agent_client_configs]]
name = "azure-gpt"
base_url = "http://127.0.0.1:8000"
prompt_type = "zeroshot_cot"